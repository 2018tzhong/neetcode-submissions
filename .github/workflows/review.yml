name: Claude Solution Review

on:
  push:
    paths:
      - "**.py"

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          CHANGED_FILE: ${{ github.event.head_commit.modified[0] || github.event.head_commit.added[0] }}
        run: |
          pip install anthropic requests -q
          python .github/scripts/review.py
