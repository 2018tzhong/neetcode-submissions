name: Claude Solution Review

on:
  push:
    paths:
      - "Data Structures & Algorithms/**.py"

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          pip install anthropic requests -q
          CHANGED_FILE=$(git diff --name-only HEAD~1 HEAD -- '*.py' | head -1)
          echo "Reviewing: $CHANGED_FILE"
          CHANGED_FILE="$CHANGED_FILE" python .github/scripts/review.py
